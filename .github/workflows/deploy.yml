name: Build and Publish Website

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f index.html
          test -f styles.css
          test -f app.js
          test -f Dockerfile

      - name: Build Docker image
        run: docker build -t mindpulse-site .
